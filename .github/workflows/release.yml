name: Release

# Auto-build and publish a Chipstrap APK release on every push to main.
# A new GitHub release is created with the release APK attached.
# Tag format: v<YYYYMMDD-HHMMSS>-<short-sha>

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases / push tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;34.0.0'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Generate release keystore (self-signed)
        env:
          KS_PASS: ${{ secrets.CHIPSTRAP_KS_PASS || 'chipstrap-default-keystore-password' }}
          KS_KEY_PASS: ${{ secrets.CHIPSTRAP_KS_KEY_PASS || 'chipstrap-default-key-password' }}
          KS_BASE64: ${{ secrets.CHIPSTRAP_KS_BASE64 }}
        run: |
          set -e
          if [ -n "$KS_BASE64" ]; then
            echo "Using provided release keystore from secrets"
            # Remove ALL whitespace (spaces, newlines, tabs, etc) then decode
            echo "$KS_BASE64" | tr -d ' \n\r\t' | base64 -d > app/release.keystore
            # Verify keystore file is valid
            if [ ! -s app/release.keystore ]; then
              echo "ERROR: Keystore file is empty after decoding"
              exit 1
            fi
            # Test the keystore
            keytool -list -keystore app/release.keystore -storepass:env KS_PASS -storetype PKCS12 > /dev/null || {
              echo "ERROR: Invalid keystore - cannot list contents"
              exit 1
            }
            echo "✓ Keystore decoded and validated successfully"
          else
            echo "Generating ephemeral self-signed release keystore"
            keytool -genkeypair -v \
              -keystore app/release.keystore \
              -storetype PKCS12 \
              -storepass:env KS_PASS \
              -keypass:env KS_KEY_PASS \
              -alias chipstrap \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Chipstrap, OU=Build, O=Chipstrap, L=NA, ST=NA, C=NA"
          fi

      - name: Build Release APK
        env:
          KS_PASS: ${{ secrets.CHIPSTRAP_KS_PASS || 'chipstrap-default-keystore-password' }}
          KS_KEY_PASS: ${{ secrets.CHIPSTRAP_KS_KEY_PASS || 'chipstrap-default-key-password' }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/release/app-release.apk artifacts/Chipstrap-release-${SHORT_SHA}.apk
          ls -la artifacts/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chipstrap-release
          path: artifacts/*.apk
          retention-days: 30

      - name: Generate release tag
        id: tag
        run: |
          TS=$(date -u +"%Y%m%d-%H%M%S")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=v${TS}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Chipstrap build ${TS} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            # Chipstrap Release Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Built at:** ${{ steps.tag.outputs.tag }}

            ## Downloads

            - `Chipstrap-release-*.apk` — release build (self-signed if no `CHIPSTRAP_KS_BASE64` secret is set)

            ## Install

            ```bash
            adb install -r Chipstrap-release-*.apk
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
          files: |
            artifacts/Chipstrap-release-*.apk
          generate_release_notes: true
          prerelease: false
