name: Build APK and upload artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;34.0.0'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Create ephemeral release keystore (self-contained)
        run: |
          # create keystore inside workspace (no secrets required)
          rm -f app/release.keystore
          mkdir -p app
          keytool -genkeypair -v \
            -keystore app/release.keystore \
            -storetype JKS \
            -storepass releasekeystorepass \
            -keypass releasekeypass \
            -alias chipstrap \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Chipstrap, OU=CI, O=Chipstrap, L=NA, ST=NA, C=US"
          chmod 600 app/release.keystore

      - name: Build Release APK (use generated keystore)
        run: |
          ./gradlew :app:assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=releasekeystorepass \
            -Pandroid.injected.signing.key.alias=chipstrap \
            -Pandroid.injected.signing.key.password=releasekeypass

      - name: Package artifact
        run: |
          mkdir -p artifacts
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/release/app-release.apk artifacts/Chipstrap-release-${SHORT_SHA}.apk || true
          ls -la artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chipstrap-release
          path: artifacts/*.apk
          retention-days: 30
